<html>



<head>
<title> Maze Game </title>

<style>

#maze{
display:grid;
grid-template-columns:repeat(5,50px);
gap:0px;
justify-content:center;

width:250px;
height:250px;
margin:auto;

background-image:url("mae.png");
background-size:250px 250px;
background-position:center 0px ;
}



.cell{
width:50px;
height:50px;
border:1px solid black;
background:transparent;
}

.wall{
    background: black;
}

.player{
background:red;
}

.goal{
background:green;
}

#popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    display:none;

    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(5px);
    justify-content:center;
    align-items:center;
   
}

#popup-box{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

body{
    background-image:url("bg.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

</style>

</head>

<body>




<h1 style ="text-align:center;"> Maze Game </h1>

<div id ="maze"></div>

<div id="popup">
<div id="popup-box">   
<h2>YOU WIN</h2>
<button onclick="restartGame()">Restart Game</button>
<button onclick="nextLevel()">Next Level</button>
</div>
</div>

<script>

let maze = document.getElementById("maze");

let playerPosition = 0;

let walls = [2,6,7,8,13,15,16,18];

function drawMaze(){
maze.innerHTML = "";

for(let i=0;i<25;i++){

let cell = document.createElement("div");

cell.classList.add("cell");

if(walls.includes(i)){
cell.classList.add("wall");
}

if(i==playerPosition){
    cell.classList.add("player");
}
if(i==24){
    cell.classList.add("goal");
}



maze.appendChild(cell);
}

}
drawMaze();
document.addEventListener("keydown",function(event){
let newPosition = playerPosition;
    if(event.key === "ArrowRight" && playerPosition %5 !== 4){
newPosition = playerPosition + 1;
}

if(event.key === "ArrowLeft" && playerPosition %5 !== 0){
    newPosition = playerPosition -1;
}

if(event.key === "ArrowUp"){
    newPosition = playerPosition - 5;
}

if(event.key === "ArrowDown"){
    newPosition = playerPosition + 5;
}



if(
    newPosition>=0 &&
    newPosition<25 &&
    !walls.includes(newPosition)){
playerPosition = newPosition;
}

drawMaze();

if(playerPosition === 24){
   document.getElementById("popup").style.display = "flex";
}
});

function restartGame(){

    playerPosition = 0;
    document.getElementById("popup").style.display = "none";
    drawMaze();
}

function nextLevel(){
    window.location.href = "mazelvl2.html";
}





</script>


</body>

</html>

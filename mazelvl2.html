<html>
<head>
    <title> Maze Game</title>

<style>

#maze{
display:grid;
grid-template-columns:repeat(21,40px);
grid-template-rows:repeat(15,40px);
gap:0px;
justify-content:center;


width:450px;
height:450px;
margin:auto;





}

.cell{
width:40px;
height:40px;
border:1px solid black;
background: transparent;
}

.wall{
    background: black;
}

.player{
background:red;
}

.goal{
background:green;
}

#popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    display:none;

    background:rgba(0,0,0,0.5);

    justify-content:center;
    align-items:center;
    
   
}

#popup-box{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

body{
    background-image:url("bg.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}


</style>

</head>

<body>

<h1 style ="text-align:center;"> Maze Game </h1>

<div id ="maze"></div>
<div id="popup">
<div id="popup-box">   
<h2>YOU WIN</h2>
<button onclick="restartGame()">Restart Game</button>
<button onclick="previousLevel()">Previous Level</button>
</div>
</div>
<script>

let maze = document.getElementById("maze");

let playerPosition = 0;

let walls = [ 5, 8, 11, 15, 18,21, 23, 24, 26, 28, 30, 32, 34, 35, 37, 39, 41,
    43, 47, 50,   60,63,  67, 68, 69, 71, 73, 75, 76, 78, 80, 81, 83,
	 87, 91, 94, 98, 101,
	 106, 107, 109, 111, 112, 113, 115, 116, 118, 119, 121, 123, 125,
	129, 131, 134,  141,
	148,  150, 151, 152, 154, 156,  158, 159, 161, 163, 165,
	168, 172, 175, 179, 182, 186,
	189,  192, 194, 196,  198, 199, 201, 203, 205, 207, 208,
	211, 214,  220,  227,
	231, 232, 233,  237, 238, 239, 240, 241, 243, 245, 246, 247, 248, 249,
	253, 256, 260, 263, 266, 269,
	273, 274, 276, 277, 278, 279, 280, 281, 282, 283, 284, 286, 287, 288, 289, 290, 291,
	294, 300, 301, 311
];

function drawMaze(){
maze.innerHTML = "";

for(let i=0;i<315;i++){

let cell = document.createElement("div");

cell.classList.add("cell");

if(walls.includes(i)){
cell.classList.add("wall");
}

if(i==playerPosition){
    cell.classList.add("player");
}
if(i==314){
    cell.classList.add("goal");
}

maze.appendChild(cell);

}

}

drawMaze();

drawMaze();
document.addEventListener("keydown",function(event){
let newPosition = playerPosition;
    if(event.key === "ArrowRight" && newPosition % 21 !== 20){
newPosition = playerPosition + 1;
}

if(event.key === "ArrowLeft" && newPosition % 21 !== 0){
    newPosition = playerPosition -1;
}

if(event.key === "ArrowUp"){
    newPosition = playerPosition - 21;
}

if(event.key === "ArrowDown"){
    newPosition = playerPosition + 21;
}

if(
    newPosition>=0 &&
    newPosition<315 &&
    !walls.includes(newPosition)){
playerPosition = newPosition;
}

drawMaze();

if(playerPosition === 314){
   document.getElementById("popup").style.display = "flex";
}
});

function restartGame(){

    playerPosition = 0;
    document.getElementById("popup").style.display = "none";
    drawMaze();
}
function previousLevel(){
    window.location.href="mazelvl1.html";
}
</script>

</body>

</html>
